--- # Applies PULL_REQUEST_TEMPLATE.md to a PR and auto-generates its Description
# section using GitHub Copilot (GitHub Models API).
#
# Usage:
#   - name: "Apply PR template and generate description"
#     uses: ./.github/actions/apply-pr-template
#     with:
#       pull_number: ${{ steps.create-pr.outputs.pr_number }}
#       github_token: ${{ secrets.GITHUB_TOKEN }}
#
# The calling job must have: pull-requests: write, contents: read, models: read
name: 'Apply PR Template and Generate Description'
description: >
  Applies .github/PULL_REQUEST_TEMPLATE.md to a PR body (if not already present)
  then uses GitHub Copilot (GitHub Models) to fill the Description section.

inputs:
  pull_number:
    description: 'Pull request number to update'
    required: true
  github_token:
    description: 'GitHub token with pull-requests:write and models:read permissions'
    required: true

runs:
  using: composite
  steps:
    - name: "Apply template and generate description"
      uses: actions/github-script@v7
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const AUTO_DESC_MARKER  = '<!-- description-auto-generated-by-copilot -->';
          const MAINTAINED_MARKER = '<!-- maintained-by-copilot -->';
          const PULL_NUMBER = parseInt('${{ inputs.pull_number }}', 10);

          // ── Fetch current PR ──────────────────────────────────────────────
          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            pull_number: PULL_NUMBER,
          });

          // ── Read template via GitHub API (no checkout needed) ─────────────
          let template;
          try {
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              path:  '.github/PULL_REQUEST_TEMPLATE.md',
            });
            template = Buffer.from(file.content, 'base64').toString('utf8').trimEnd();
          } catch {
            console.log('No PULL_REQUEST_TEMPLATE.md found — skipping.');
            return;
          }

          // ── Apply template if the PR body is empty or unmodified ──────────
          let body = pr.body ?? '';

          const normalize = (s) => s.trim().replace(/\r\n/g, '\n');
          const bodyStripped = body
            .replace(MAINTAINED_MARKER, '')
            .replace(AUTO_DESC_MARKER, '')
            .trim();

          const needsTemplate =
            bodyStripped === '' || normalize(bodyStripped) === normalize(template);

          if (needsTemplate && !body.includes(MAINTAINED_MARKER)) {
            body = `${template}\n\n${MAINTAINED_MARKER}`;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: PULL_NUMBER,
              body,
            });
            console.log(`Applied PR template to PR #${PULL_NUMBER}.`);
          }

          // Only generate a description for PRs managed by this action.
          if (!body.includes(MAINTAINED_MARKER)) {
            console.log('PR body does not contain the maintained marker — skipping description generation.');
            return;
          }

          // ── Check whether the Description section already has real content ─
          function getDescriptionContent(text) {
            const m = text.match(/^#{1,3}\s+Description\s*\n([\s\S]*?)(?=\n#{1,3}\s|$)/m);
            return m ? m[1] : null;
          }

          function hasRealContent(content) {
            if (!content) return false;
            return content.replace(/<!--[\s\S]*?-->/g, '').trim().length > 0;
          }

          const descContent   = getDescriptionContent(body);
          const descHasContent = hasRealContent(descContent);
          const hasAutoMarker  = body.includes(AUTO_DESC_MARKER);

          // A manually-written description (content without auto marker) is never overwritten.
          if (descHasContent && !hasAutoMarker) {
            console.log('PR has a manually-written description — skipping generation.');
            return;
          }

          // ── Build file-change summary for the prompt ──────────────────────
          const files = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo:  context.repo.repo,
            pull_number: PULL_NUMBER,
            per_page: 100,
          });

          const MAX_FILES = 200;
          let filesSummary = files
            .slice(0, MAX_FILES)
            .map((f) => `${f.filename} (${f.status}: +${f.additions}/-${f.deletions})`)
            .join('\n');
          if (files.length > MAX_FILES) {
            filesSummary += `\n... and ${files.length - MAX_FILES} more files`;
          }

          // ── Call GitHub Models API (Copilot) ─────────────────────────────
          let generatedDescription = null;
          try {
            const response = await fetch(
              'https://models.inference.ai.azure.com/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [
                    {
                      role: 'system',
                      content:
                        'You are a helpful assistant that writes concise pull request descriptions. ' +
                        'Write a clear 2–4 sentence description of what this pull request does, ' +
                        'based on the PR title and changed files. Be specific and technical. ' +
                        'Do not include markdown headers or bullet points.',
                    },
                    {
                      role: 'user',
                      content:
                        `PR Title: ${pr.title}\n\nChanged files:\n${filesSummary}\n\n` +
                        'Write a concise description for this pull request.',
                    },
                  ],
                  max_tokens: 300,
                  temperature: 0.3,
                }),
              },
            );

            if (response.ok) {
              const result = await response.json();
              generatedDescription = result.choices?.[0]?.message?.content?.trim() ?? null;
            } else {
              const errText = await response.text();
              console.log(`GitHub Models API error ${response.status}: ${errText}`);
            }
          } catch (err) {
            console.log(`Error calling GitHub Models API: ${err.message}`);
          }

          if (!generatedDescription) {
            console.log('Could not generate a description — skipping.');
            return;
          }

          // ── Insert generated description into the template body ────────────
          let updatedBody = body
            .replace(`\n${AUTO_DESC_MARKER}`, '')
            .replace(AUTO_DESC_MARKER, '');

          const sectionRe = /(^#{1,3}\s+Description\s*\n)([\s\S]*?)(?=\n#{1,3}\s|$)/m;
          const sectionMatch = updatedBody.match(sectionRe);

          if (sectionMatch) {
            updatedBody = updatedBody.replace(
              sectionMatch[0],
              `${sectionMatch[1]}${generatedDescription}\n\n${AUTO_DESC_MARKER}\n\n`,
            );
          } else {
            updatedBody =
              `# Description\n\n${generatedDescription}\n\n${AUTO_DESC_MARKER}\n\n` +
              updatedBody;
          }

          await github.rest.pulls.update({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            pull_number: PULL_NUMBER,
            body: updatedBody,
          });

          console.log(`Generated and inserted description for PR #${PULL_NUMBER}.`);
