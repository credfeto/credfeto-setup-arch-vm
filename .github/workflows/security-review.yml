--- # Automated security analysis of the Ansible configuration using GitHub Copilot (GitHub Models).
# Analyses the ansible roles for security improvements and opens issues tagged 'AI-Work'
# describing the work to be done rather than making changes directly.
name: "Security: Analyse Ansible Config"

on:
  push:
    branches:
      - main
      - 'dev/workflow/security-review/**'
    paths:
      - 'site.yml'
      - 'roles/**'
      - '.github/workflows/security-review.yml'
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC (quiet time)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  security-review:
    name: "Copilot Security Review"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      models: read

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          clean: true
          fetch-depth: 0
          fetch-tags: true

      - name: "Gather ansible role files"
        id: gather
        run: |
          ROLE_FILES=$(find roles -name "*.yml" | sort | tr '\n' ' ')
          echo "role_files=${ROLE_FILES}" >> "${GITHUB_OUTPUT}"

      - name: "Analyse ansible config with GitHub Copilot"
        id: analyse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROLE_FILES: ${{ steps.gather.outputs.role_files }}
        run: |
          python3 - << 'PYEOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          role_files_str = os.environ.get("ROLE_FILES", "").strip()
          role_files = [f for f in role_files_str.split() if f]

          if not role_files:
              print("No ansible role files found; nothing to analyse.")
              github_output = os.environ.get("GITHUB_OUTPUT", "")
              if github_output:
                  with open(github_output, "a") as fh:
                      fh.write("findings_json=[]\n")
              sys.exit(0)

          # Collect all role file contents
          role_content_parts = []
          for path in role_files:
              try:
                  with open(path, "r") as fh:
                      content = fh.read()
                  role_content_parts.append(f"=== {path} ===\n{content}")
              except OSError:
                  pass

          all_content = "\n\n".join(role_content_parts)
          # Truncate to avoid token limits (~80k chars is roughly 20k tokens)
          if len(all_content) > 80000:
              all_content = all_content[:80000] + "\n\n... (truncated)"

          system_prompt = """\
          You are a Linux security expert specialising in Arch Linux, Ansible, systemd hardening,
          and infrastructure-as-code security review.

          You will be given the contents of an Ansible configuration (roles and tasks) for an
          Arch Linux VM. Your task is to identify specific, actionable security improvements and
          report them as a JSON array of findings.

          For each finding produce a JSON object with these fields:
            - "title": a short (max 72 chars) issue title suitable for a GitHub issue
            - "body": a detailed GitHub-flavoured Markdown description of the finding, including:
                * What the current configuration does (or omits)
                * Why it is a security concern
                * The specific change(s) needed in the Ansible role(s)
                * File path(s) and task name(s) affected
                * Any relevant CVEs, advisories, or authoritative references

          Categories to consider:
          1. MISSING HARDENING — sysctl values, kernel parameters, or file permissions that
             should be set but are absent.
          2. OUTDATED OR COUNTERPRODUCTIVE SETTINGS — values that are deprecated, redundant,
             conflict with modern Linux security models, or break Docker/container networking.
          3. SYSTEMD SERVICE SANDBOXING — for services whose configuration the roles manage,
             identify missing sandboxing options (PrivateTmp, ProtectSystem, NoNewPrivileges,
             CapabilityBoundingSet, etc.). Do NOT recommend drop-ins for services that are only
             installed via the package manager and left at upstream defaults; those are the
             package maintainer's responsibility.
          4. SSH HARDENING — missing or weak SSH server configuration options.
          5. FIREWALL / NETWORK — missing firewall rules or overly permissive network settings.
          6. ANSIBLE BEST PRACTICES — tasks that are not idempotent, use deprecated modules,
             or have insecure file permissions in copy/template tasks.

          Constraints:
            - Docker bridge networking (docker0, br-*) must not be broken.
            - Do NOT recommend kernel.unprivileged_userns_clone=0 — it breaks rootless containers.
            - Only flag real, specific issues; do not invent theoretical problems.
            - Each finding must be independently actionable.
            - If there is nothing to flag in a category, omit it — do not pad with noise.

          Return ONLY a valid JSON array (possibly empty). No markdown fences, no explanation,
          no text before or after the array.
          Example minimal response: []
          Example single-item response:
          [{"title": "sysctl: enable TCP SYN cookies", "body": "## Finding\\n..."}]
          """

          def call_model(messages):
              req = urllib.request.Request(
                  "https://models.inference.ai.azure.com/chat/completions",
                  data=json.dumps({
                      "model": "gpt-4o",
                      "messages": messages,
                      "temperature": 0.1,
                      "max_tokens": 16384,
                  }).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=300) as response:
                      result = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  print(f"GitHub Models API error {exc.code}: {body}", file=sys.stderr)
                  sys.exit(1)
              return result["choices"][0]["message"]["content"]

          def clean_json_response(raw):
              text = raw.strip()
              # Strip markdown fences if present
              if text.startswith("```"):
                  lines = text.splitlines()
                  start = 1
                  end = len(lines) - 1 if lines[-1].strip() == "```" else len(lines)
                  text = "\n".join(lines[start:end])
              return text.strip()

          messages = [
              {"role": "system", "content": system_prompt},
              {
                  "role": "user",
                  "content": (
                      "Analyse the following Ansible configuration for an Arch Linux VM "
                      "and return a JSON array of security findings:\n\n"
                      + all_content
                  ),
              },
          ]

          print("Calling model to analyse ansible config...")
          raw = call_model(messages)
          cleaned = clean_json_response(raw)

          try:
              findings = json.loads(cleaned)
          except json.JSONDecodeError as exc:
              print(f"Failed to parse model response as JSON: {exc}", file=sys.stderr)
              print(f"Raw response (first 500 chars): {cleaned[:500]}", file=sys.stderr)
              sys.exit(1)

          if not isinstance(findings, list):
              print("Model response is not a JSON array; aborting.", file=sys.stderr)
              sys.exit(1)

          # Validate each finding has required fields
          validated = []
          for item in findings:
              if isinstance(item, dict) and "title" in item and "body" in item:
                  validated.append({"title": str(item["title"]), "body": str(item["body"])})
              else:
                  print(f"Skipping malformed finding: {item}", file=sys.stderr)

          print(f"Found {len(validated)} security finding(s).")
          for i, f in enumerate(validated, 1):
              print(f"  {i}. {f['title']}")

          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              # Use a delimiter to safely write multi-line JSON to GITHUB_OUTPUT
              with open(github_output, "a") as fh:
                  fh.write("findings_json<<FINDINGS_EOF\n")
                  fh.write(json.dumps(validated))
                  fh.write("\nFINDINGS_EOF\n")
          PYEOF

      - name: "Create issues for findings"
        if: steps.analyse.outputs.findings_json != '[]' && steps.analyse.outputs.findings_json != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINDINGS_JSON: ${{ steps.analyse.outputs.findings_json }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          findings_raw = os.environ.get("FINDINGS_JSON", "[]").strip()

          try:
              findings = json.loads(findings_raw)
          except json.JSONDecodeError:
              print("No valid findings JSON; skipping issue creation.")
              sys.exit(0)

          if not findings:
              print("No findings to create issues for.")
              sys.exit(0)

          # Fetch existing open issues with label AI-Work to avoid duplicates
          def api_request(method, path, data=None):
              url = f"https://api.github.com/repos/{repo}/{path}"
              body = json.dumps(data).encode("utf-8") if data is not None else None
              req = urllib.request.Request(
                  url,
                  data=body,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  body_text = exc.read().decode("utf-8", errors="replace")
                  print(f"GitHub API error {exc.code} on {method} {path}: {body_text}", file=sys.stderr)
                  return None

          # Ensure the AI-Work label exists (create it if absent)
          existing_label = api_request("GET", "labels/AI-Work")
          if existing_label is None:
              print("Creating 'AI-Work' label...")
              api_request("POST", "labels", {
                  "name": "AI-Work",
                  "color": "7057ff",
                  "description": "Work identified by automated AI security review",
              })

          # Fetch existing open issues labelled AI-Work (first page — 100 issues max)
          existing_issues = api_request("GET", "issues?labels=AI-Work&state=open&per_page=100") or []
          existing_titles = {issue["title"].strip() for issue in existing_issues}

          created = 0
          skipped = 0
          for finding in findings:
              title = finding["title"].strip()
              body = finding["body"].strip()

              if title in existing_titles:
                  print(f"Skipping duplicate issue: {title}")
                  skipped += 1
                  continue

              issue_body = (
                  body
                  + "\n\n---\n"
                  + "_This issue was created automatically by the security review workflow "
                  + "(`security-review.yml`) using GitHub Copilot (GitHub Models API)._"
              )

              result = api_request("POST", "issues", {
                  "title": title,
                  "body": issue_body,
                  "labels": ["AI-Work"],
              })
              if result and "number" in result:
                  print(f"Created issue #{result['number']}: {title}")
                  created += 1
              else:
                  print(f"Failed to create issue: {title}", file=sys.stderr)

          print(f"Done: {created} issue(s) created, {skipped} duplicate(s) skipped.")
          PYEOF
