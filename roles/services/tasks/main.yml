---
# Cleanup legacy auto-update service if present
- name: Disable auto-update timer if present
  ansible.builtin.systemd:
    name: auto-update.timer
    enabled: false
    state: stopped
    daemon_reload: false
  failed_when: false

- name: Remove auto-update.timer unit
  ansible.builtin.file:
    path: /etc/systemd/system/auto-update.timer
    state: absent
  notify: Reload systemd

- name: Remove auto-update.service unit
  ansible.builtin.file:
    path: /etc/systemd/system/auto-update.service
    state: absent
  notify: Reload systemd

- name: Remove auto-update script
  ansible.builtin.file:
    path: /usr/local/bin/auto-update
    state: absent

# paccache-cleanup service + timer
- name: Install paccache-cleanup.service unit
  ansible.builtin.copy:
    src: paccache-cleanup.service
    dest: /etc/systemd/system/paccache-cleanup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install paccache-cleanup.timer unit
  ansible.builtin.copy:
    src: paccache-cleanup.timer
    dest: /etc/systemd/system/paccache-cleanup.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start paccache-cleanup timer
  ansible.builtin.systemd:
    name: paccache-cleanup.timer
    enabled: true
    state: started
    daemon_reload: true

# docker-cleanup service + timer
- name: Install docker-cleanup.service unit
  ansible.builtin.copy:
    src: docker-cleanup.service
    dest: /etc/systemd/system/docker-cleanup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install docker-cleanup.timer unit
  ansible.builtin.copy:
    src: docker-cleanup.timer
    dest: /etc/systemd/system/docker-cleanup.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start docker-cleanup timer
  ansible.builtin.systemd:
    name: docker-cleanup.timer
    enabled: true
    state: started
    daemon_reload: true

# pkgstats timer (ships with the pkgstats package)
- name: Enable and start pkgstats timer
  ansible.builtin.systemd:
    name: pkgstats.timer
    enabled: true
    state: started
    daemon_reload: true
