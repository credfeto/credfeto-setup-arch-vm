---
# auto-update wrapper script
- name: Install auto-update wrapper script
  ansible.builtin.copy:
    src: auto-update
    dest: /usr/local/bin/auto-update
    owner: root
    group: root
    mode: "0755"

# auto-update service + timer
- name: Install auto-update.service unit
  ansible.builtin.copy:
    src: auto-update.service
    dest: /etc/systemd/system/auto-update.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install auto-update.timer unit
  ansible.builtin.copy:
    src: auto-update.timer
    dest: /etc/systemd/system/auto-update.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start auto-update timer
  ansible.builtin.systemd:
    name: auto-update.timer
    enabled: true
    state: started
    daemon_reload: true

