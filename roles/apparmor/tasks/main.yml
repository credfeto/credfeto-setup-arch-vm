---
- name: Enable and start apparmor service
  ansible.builtin.systemd:
    name: apparmor
    enabled: true
    state: started

- name: Enable and start auditd for AppArmor audit logging
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started

- name: Install apparmor-profiles if available
  community.general.pacman:
    name: apparmor-profiles
    state: present
    extra_args: "--noconfirm --needed"
  ignore_errors: true  # noqa: ignore-errors - package may not be available in repos
