---
- name: Set kernel.dmesg_restrict
  ansible.posix.sysctl:
    name: kernel.dmesg_restrict
    value: "1"
    sysctl_file: /etc/sysctl.d/10-kernel.dmesg_restrict.conf
    reload: true

- name: Set kernel.unprivileged_bpf_disabled
  ansible.posix.sysctl:
    name: kernel.unprivileged_bpf_disabled
    value: "1"
    sysctl_file: /etc/sysctl.d/10-kernel.unprivileged_bpf_disabled.conf
    reload: true

- name: Set net.core.bpf_jit_harden
  ansible.posix.sysctl:
    name: net.core.bpf_jit_harden
    value: "2"
    sysctl_file: /etc/sysctl.d/10-net.core.bpf_jit_harden.conf
    reload: true

- name: Set kernel.kexec_load_disabled
  ansible.posix.sysctl:
    name: kernel.kexec_load_disabled
    value: "1"
    sysctl_file: /etc/sysctl.d/10-kernel.kexec_load_disabled.conf
    reload: true
    ignore_errors: true  # noqa: ignore-errors - key may not exist in hardened kernel

- name: Set kernel.kptr_restrict
  ansible.posix.sysctl:
    name: kernel.kptr_restrict
    value: "2"
    sysctl_file: /etc/sysctl.d/10-kernel.kptr_restrict.conf
