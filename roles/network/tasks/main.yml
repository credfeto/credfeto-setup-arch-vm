---
# resolv.conf.j2 pairs these lists up index-for-index (same host at the same
# index in each list) and interleaves them; a length mismatch would make
# Jinja's zip() silently drop whichever family's trailing entries instead of
# failing loudly, so check it up front.
- name: Assert nameserver lists are the same length
  ansible.builtin.assert:
    that:
      - network_nameservers_ipv4 | length == network_nameservers_ipv6 | length
    fail_msg: >-
      network_nameservers_ipv4 ({{ network_nameservers_ipv4 | length }} entries) and
      network_nameservers_ipv6 ({{ network_nameservers_ipv6 | length }} entries) must be
      the same length - resolv.conf.j2 pairs them up index-for-index.

# DNS server hosts (dns-01, dns-02, ...) must not point their own resolver at
# systemd-resolved's upstream list: that list includes the DNS servers
# themselves, so a resolved restart/crash on one of these boxes would leave
# it unable to resolve anything, including itself. They get the plain static
# templated /etc/resolv.conf below instead. ansible_hostname is the real
# machine hostname; inventory_hostname is always "localhost" here
# (hosts: localhost).
- name: Determine if this host is a DNS server
  ansible.builtin.set_fact:
    network_is_dns_server: "{{ ansible_hostname is match('^dns-[0-9]{2}$') }}"

# eth0.network is re-applied on every run, so IP/GW/DNS changes made in this
# role reach hosts that already have the file. All addresses on the primary
# interface are detected (not just the first per family) and written back,
# sorted for a stable ordering, so hosts with multiple IPv4/IPv6 addresses
# are handled without clobbering anything.
#
# Trade-off: this is a live snapshot, not a merge with whatever was there
# before. If an address is transiently absent from the interface at the
# exact moment this runs (e.g. a failover/VIP address mid-reassignment), it
# is genuinely absent from the rewritten file, and "Reload networkctl" below
# applies that immediately. There is no guard against this beyond the address
# being consistently present when ansible-pull runs on its normal schedule.
- name: Detect primary network interface
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ip -o link show | awk \
        '/^[0-9]+: (eth|enp|ens)/{sub(/:$/, "", $2); print $2; exit}'
    executable: /bin/bash
  register: network_nic
  changed_when: false
  when: not ansible_check_mode

# temporary/deprecated address flags are excluded: they're inherently
# transient (privacy-extension rotation, or already on their way out) and
# must never be pinned into a static Address= line. Filtering is done inside
# the single awk command (rather than a separate grep -v stage) so that
# "every address on this link got filtered out" is empty output, not a
# non-zero exit that set -o pipefail would turn into a task failure.
- name: Detect IPv4 addresses
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ip -o -4 addr show dev {{ network_nic.stdout }} scope global \
        | awk '{skip=0; for (i=5; i<=NF; i++) if ($i=="temporary" || $i=="deprecated") skip=1; if (!skip) print $4}' \
        | sort -V
    executable: /bin/bash
  register: network_ipv4
  changed_when: false
  when:
    - not ansible_check_mode
    - network_nic.stdout | length > 0

- name: Detect IPv4 gateway
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ip -4 route show default dev {{ network_nic.stdout }} \
        | awk 'NR==1{print $3}'
    executable: /bin/bash
  register: network_gw4
  changed_when: false
  when:
    - not ansible_check_mode
    - network_nic.stdout | length > 0

# temporary/deprecated address flags are excluded: see the comment above the
# IPv4 equivalent task.
- name: Detect IPv6 addresses
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ip -o -6 addr show dev {{ network_nic.stdout }} scope global \
        | awk '{skip=0; for (i=5; i<=NF; i++) if ($i=="temporary" || $i=="deprecated") skip=1; if (!skip) print $4}' \
        | sort -V
    executable: /bin/bash
  register: network_ipv6
  changed_when: false
  when:
    - not ansible_check_mode
    - network_nic.stdout | length > 0

- name: Detect IPv6 gateway
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ip -6 route show default dev {{ network_nic.stdout }} \
        2>/dev/null | awk 'NR==1{print $3}'
    executable: /bin/bash
  register: network_gw6
  changed_when: false
  when:
    - not ansible_check_mode
    - network_nic.stdout | length > 0

- name: Write systemd-networkd configuration for primary interface
  ansible.builtin.template:
    src: eth0.network.j2
    dest: /etc/systemd/network/eth0.network
    owner: root
    group: root
    mode: "0644"
  when:
    - not ansible_check_mode
    - network_nic.stdout | length > 0
    - network_ipv4.stdout | length > 0

# DNS servers get the static file directly (glibc only reads the first 3
# nameserver lines; see the comments in templates/resolv.conf.j2). Every
# other host uses systemd-resolved instead, which has no such limit.
- name: Write /etc/resolv.conf
  ansible.builtin.template:
    src: resolv.conf.j2
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
  when: network_is_dns_server

- name: Ensure /etc/systemd/resolved.conf.d exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not network_is_dns_server

- name: Write systemd-resolved global DNS server list
  ansible.builtin.template:
    src: resolved-dns.conf.j2
    dest: /etc/systemd/resolved.conf.d/10-dns-servers.conf
    owner: root
    group: root
    mode: "0644"
  when: not network_is_dns_server
  notify: Restart systemd-resolved

- name: Enable and start systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    enabled: true
    state: started
  when: not network_is_dns_server

- name: Point /etc/resolv.conf at systemd-resolved's stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  when: not network_is_dns_server

- name: Reload networkctl
  ansible.builtin.command:
    cmd: networkctl reload
  changed_when: true
