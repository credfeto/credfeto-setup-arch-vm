---
# Single source of truth for the fleet's nameservers. Only the last group
# differs between hosts, so it's defined once as network_nameserver_suffixes
# and combined with the fixed prefixes below - this also guarantees the
# derived IPv4/IPv6 lists always stay the same length (see the "nameserver
# lists must be the same length" assert in tasks/main.yml, kept as a
# defense-in-depth check in case either list is ever overridden directly at
# a higher precedence). Consumed by:
# - templates/resolv.conf.j2 (static /etc/resolv.conf on dns-?? hosts)
# - templates/resolved-dns.conf.j2 (global DNS= for systemd-resolved,
#   on every other host)
network_nameserver_prefix_ipv4: "192.168.42."
network_nameserver_prefix_ipv6: "2a02:8010:61d5:42::"

network_nameserver_suffixes:
  - "101"
  - "102"
  - "103"
  - "104"
  - "105"

network_nameservers_ipv4: "{{ network_nameserver_suffixes | map('regex_replace', '^', network_nameserver_prefix_ipv4) | list }}"
network_nameservers_ipv6: "{{ network_nameserver_suffixes | map('regex_replace', '^', network_nameserver_prefix_ipv6) | list }}"
