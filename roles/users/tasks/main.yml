---
- name: Create autoupdate system user
  ansible.builtin.user:
    name: autoupdate
    system: true
    create_home: true
    home: /home/autoupdate
    shell: /usr/sbin/nologin
    state: present

- name: Ensure autoupdate home directory has correct ownership
  ansible.builtin.file:
    path: /home/autoupdate
    state: directory
    owner: autoupdate
    group: autoupdate
    mode: "0750"

- name: Ensure .ansible/tmp directory exists for autoupdate user
  ansible.builtin.file:
    path: /home/autoupdate/.ansible/tmp
    state: directory
    owner: autoupdate
    group: autoupdate
    mode: "0700"

- name: Write sudoers file for autoupdate (NOPASSWD ALL for ansible-pull)
  ansible.builtin.copy:
    dest: /etc/sudoers.d/autoupdate
    content: "autoupdate ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -c -f %s

- name: Remove legacy 01_markr sudoers file
  ansible.builtin.file:
    path: /etc/sudoers.d/01_markr
    state: absent
