---
# Fix typo from earlier versions of the install script
- name: Fix hardened_usercopy typo in GRUB config
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: 'hardend_usercopy'
    replace: 'hardened_usercopy'
  notify: boot-config-changed

# Ensure lsm= includes integrity
- name: Ensure lsm parameter includes integrity
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '(GRUB_CMDLINE_LINUX="[^"]*)\blsm=(?!.*\bintegrity\b)([^" ]*)'
    replace: '\1lsm=landlock,lockdown,yama,integrity,apparmor,bpf'
  notify: boot-config-changed

# Add each required kernel parameter if not already present
- name: Ensure panic=20 in GRUB_CMDLINE_LINUX
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    backrefs: true
    regexp: '^(GRUB_CMDLINE_LINUX="(?!.*\bpanic=).*)"$'
    line: '\1 panic=20"'
  notify: boot-config-changed

