---
- name: Ensure /etc/containers directory exists
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: container_runtime == 'podman'

- name: Configure Podman registries
  ansible.builtin.copy:
    src: registries.conf
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"
  when: container_runtime == 'podman'

- name: Enable kernel.unprivileged_userns_clone for Podman rootless containers
  ansible.posix.sysctl:
    name: kernel.unprivileged_userns_clone
    value: "1"
    sysctl_file: /etc/sysctl.d/10-kernel.unprivileged_userns_clone.conf
    reload: true
  when: container_runtime == 'podman'

- name: Deploy Podman security audit script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/scripts/podman-security-audit.sh"
    dest: /usr/local/bin/podman-security-audit.sh
    owner: root
    group: root
    mode: "0755"
  when: container_runtime == 'podman'

- name: Install podman-security-audit.service unit
  ansible.builtin.copy:
    src: podman-security-audit.service
    dest: /etc/systemd/system/podman-security-audit.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: container_runtime == 'podman'

- name: Install podman-security-audit.timer unit
  ansible.builtin.copy:
    src: podman-security-audit.timer
    dest: /etc/systemd/system/podman-security-audit.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: container_runtime == 'podman'

- name: Enable and start podman-security-audit timer
  ansible.builtin.systemd:
    name: podman-security-audit.timer
    enabled: true
    state: started
    daemon_reload: true
  when: container_runtime == 'podman'

# Quadlet: system-level container management via systemd
- name: Ensure system-level Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: container_runtime == 'podman'

- name: Enable lingering for markr
  ansible.builtin.command:
    cmd: loginctl enable-linger markr
    creates: /var/lib/systemd/linger/markr
  when: container_runtime == 'podman'

- name: Deploy nginx Quadlet container unit
  ansible.builtin.copy:
    src: nginx.container
    dest: /etc/containers/systemd/nginx.container
    owner: root
    group: root
    mode: "0644"
  when: container_runtime == 'podman'

- name: Enable and start nginx container service
  ansible.builtin.systemd:
    name: nginx.service
    enabled: true
    state: started
    daemon_reload: true
  when: container_runtime == 'podman'
