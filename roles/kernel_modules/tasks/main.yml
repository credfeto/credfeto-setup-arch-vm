---
# Blacklist kernel modules affected by Dirty Frag (CVE-2026-43284, CVE-2026-43500).
# esp4/esp6 are the IPsec ESP variants; rxrpc is the AFS RxRPC variant.
# Reference: https://www.phoronix.com/news/Dirty-Frag-Linux

- name: Capture currently loaded modules
  ansible.builtin.command:
    cmd: lsmod
  register: kernel_modules_lsmod_output
  changed_when: false

- name: Blacklist esp4 (Dirty Frag CVE-2026-43284)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-dirtyfrag-esp4.conf
    content: |
      # Dirty Frag CVE-2026-43284 — disable IPsec ESP (IPv4)
      blacklist esp4
      install esp4 /bin/false
    owner: root
    group: root
    mode: "0644"

- name: Unload esp4 if currently loaded
  community.general.modprobe:
    name: esp4
    state: absent
  when: "'esp4' in kernel_modules_lsmod_output.stdout"

- name: Blacklist esp6 (Dirty Frag CVE-2026-43284)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-dirtyfrag-esp6.conf
    content: |
      # Dirty Frag CVE-2026-43284 — disable IPsec ESP (IPv6)
      blacklist esp6
      install esp6 /bin/false
    owner: root
    group: root
    mode: "0644"

- name: Unload esp6 if currently loaded
  community.general.modprobe:
    name: esp6
    state: absent
  when: "'esp6' in kernel_modules_lsmod_output.stdout"

- name: Blacklist rxrpc (Dirty Frag CVE-2026-43500)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-dirtyfrag-rxrpc.conf
    content: |
      # Dirty Frag CVE-2026-43500 — disable AFS RxRPC
      blacklist rxrpc
      install rxrpc /bin/false
    owner: root
    group: root
    mode: "0644"

- name: Unload rxrpc if currently loaded
  community.general.modprobe:
    name: rxrpc
    state: absent
  when: "'rxrpc' in kernel_modules_lsmod_output.stdout"

# ---------------------------------------------------------------------------
# Unused high-risk network protocols (equivalent to ModuleJail conservative)
# ---------------------------------------------------------------------------

- name: Blacklist unused high-risk network protocols (DCCP, SCTP, RDS, TIPC, n_hdlc)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-unused-protocols.conf
    content: |
      # Unused network protocols — high LPE attack surface, not needed on a server VM
      blacklist dccp
      install dccp /bin/false
      blacklist dccp_ipv4
      install dccp_ipv4 /bin/false
      blacklist dccp_ipv6
      install dccp_ipv6 /bin/false
      blacklist sctp
      install sctp /bin/false
      blacklist rds
      install rds /bin/false
      blacklist rds_tcp
      install rds_tcp /bin/false
      blacklist tipc
      install tipc /bin/false
      blacklist n_hdlc
      install n_hdlc /bin/false
    owner: root
    group: root
    mode: "0644"

- name: Unload dccp if currently loaded
  community.general.modprobe:
    name: dccp
    state: absent
  when: "'dccp' in kernel_modules_lsmod_output.stdout"

- name: Unload dccp_ipv4 if currently loaded
  community.general.modprobe:
    name: dccp_ipv4
    state: absent
  when: "'dccp_ipv4' in kernel_modules_lsmod_output.stdout"

- name: Unload dccp_ipv6 if currently loaded
  community.general.modprobe:
    name: dccp_ipv6
    state: absent
  when: "'dccp_ipv6' in kernel_modules_lsmod_output.stdout"

- name: Unload sctp if currently loaded
  community.general.modprobe:
    name: sctp
    state: absent
  when: "'sctp' in kernel_modules_lsmod_output.stdout"

- name: Unload rds if currently loaded
  community.general.modprobe:
    name: rds
    state: absent
  when: "'rds' in kernel_modules_lsmod_output.stdout"

- name: Unload rds_tcp if currently loaded
  community.general.modprobe:
    name: rds_tcp
    state: absent
  when: "'rds_tcp' in kernel_modules_lsmod_output.stdout"

- name: Unload tipc if currently loaded
  community.general.modprobe:
    name: tipc
    state: absent
  when: "'tipc' in kernel_modules_lsmod_output.stdout"

- name: Unload n_hdlc if currently loaded
  community.general.modprobe:
    name: n_hdlc
    state: absent
  when: "'n_hdlc' in kernel_modules_lsmod_output.stdout"

