- name: Blacklist VM-absent hardware modules (Bluetooth, USB storage, vivid)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-vm-absent-hardware.conf
    content: |
      # Hardware not present in a server VM
      blacklist bluetooth
      install bluetooth /bin/false
      blacklist btusb
      install btusb /bin/false
      blacklist usb_storage
      install usb_storage /bin/false
      blacklist vivid
