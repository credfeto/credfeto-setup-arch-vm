- name: Blacklist amateur radio and legacy packet radio protocols
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-amateur-radio.conf
    content: |
      # Amateur radio protocols — absent on a server VM
      blacklist ax25
      install ax25 /bin/false
      blacklist netrom
      install netrom /bin/false
      blacklist rose
      install rose /bin/false
      blacklist x25
      install x25 /bin/false
